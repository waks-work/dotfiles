##########################################################################################
# HYPRLAND CONFIG (Refactored for Global Script System)
# Author: Havan Sunday
# Structure: clean, modular, and script-integrated
##########################################################################################

# ──────────────────────────────────────────────────────────────
#   COLOR SOURCING (Dynamic from Pywal)
# ──────────────────────────────────────────────────────────────
source = ~/.cache/wal/colors-hyprland.conf


# ──────────────────────────────────────────────────────────────
#  🧩 STARTUP SERVICES
# ──────────────────────────────────────────────────────────────
exec-once = hyprctl setcursor catppuccin-mocha-dark-cursors 28
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = swaync &
exec-once = hypridle &
exec-once = swww-daemon &
exec-once = waybar &
exec-once =  bash ~/.local/scripts/waks_manager/menu-main.sh & 

# Run walker theme auto-applier at login (Omarchy)
exec-once = ~/.local/scripts/system/apply-walker-theme.sh &

# Restore previous colors + reload Walker at login
exec-once = wal -R && ~/.local/scripts/hypr/update-hypr-colors.sh && walker reload

# Optional service autostart
exec-once = elephant service enable && systemctl --user start elephant
exec-once = elephant &


# ──────────────────────────────────────────────────────────────
#  🖥️  MONITORS
# ──────────────────────────────────────────────────────────────
monitor = ,preferred,auto,1


# ──────────────────────────────────────────────────────────────
#  ⚙️  ENVIRONMENT
# ──────────────────────────────────────────────────────────────
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = GDK_SCALE,1
env = GDK_DPI_SCALE,1
env = XCURSOR_THEME,Adwaita
env = FREETYPE_PROPERTIES,truetype:interpretter-version=40

env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland

# ──────────────────────────────────────────────────────────────
#  🧭 INPUT SETTINGS
# ──────────────────────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


# ──────────────────────────────────────────────────────────────
#  ✨ LOOK & FEEL
# ──────────────────────────────────────────────────────────────
general {
    gaps_in = 2.0
    gaps_out = 2.0
    border_size = 2
    col.active_border = rgba(0e81b9ee) rgba(20006dee) rgba(185887ee) rgba(5e0092ee) rgba(ffffffff) rgba(003377ee) 135deg 
    col.inactive_border = rgba(191a2eaa)
    resize_on_border = true
    layout = dwindle
}

decoration {
    rounding = 1
    rounding_power = 1
    active_opacity = 0.99
    inactive_opacity = 0.9

    shadow {
        enabled = true
        range = 25
        render_power = 3
        color = 0x55000000
    }

    blur {
        enabled = true
        size = 10
        passes = 4
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes
    bezier = almostLinear, 0.5, 0.5, 0.75, 0.75
    bezier = easeOutCubic, 0.33, 1, 0.68, 1
    bezier = easeInOutQuint,0.83, 0, 0.17, 1
    bezier = quick, 0.15, 0, 0.1, 1
    animation = global, 1, 8, default
    animation = windows, 1, 4.5, easeInOutQuint
    animation = fade, 1, 2.5, almostLinear
    animation = layers, 1, 2.4, easeInOutQuint, fade
    animation = workspaces, 1, 2.2, easeOutCubic, fade
    animation = workspaces, 1, 1.94, almostLinear, fade
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}


# ──────────────────────────────────────────────────────────────
#  🧱 LAYOUTS
# ──────────────────────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}
# ──────────────────────────────────────────────────────────────
# 🌐 OMARCHY WEB APPS (Refactored for 0.53+ Syntax)
# ──────────────────────────────────────────────────────────────

# Global rules for all windows starting with 'omarchy-'
windowrule = match:class ^(omarchy-.*)$, tile on
windowrule = match:class ^(omarchy-.*)$, no_focus on
windowrule = match:class ^(omarchy-.*)$, center on

# Updated event suppression (Syntax: suppress_event [types...])
windowrule = match:class ^(omarchy-.*)$, suppress_event activate activatefocus fullscreen

# Specific override for the terminal
windowrule = match:class ^(omarchy-terminal)$, float on

# ──────────────────────────────────────────────────────────────
#  🚀 PROGRAM SHORTCUTS
# ──────────────────────────────────────────────────────────────
$mainMod = SUPER
$terminal = wezterm
$fileManager = dolphin#thunar
$menu = wofi --show drun
$rofiTheme = rofi -show drun -theme ~/.config/rofi/tokyo-night.rasi
$reload_waybar = pkill waybar; waybar &


# Core bindings
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, bash ~/.local/scripts/waks_manager/qt-browser.sh
bind = $mainMod, Z, exec, zen-browser
bind = $mainMod, R, exec, bash ~/.local/scripts/waks_manager/menu-launcher.sh
bind = $mainMod, C, killactive,
bind = $mainMod, ^, exit,
bind = $mainMod, F, exec, fullscreen
bind = $mainMod, SPACE, exec, $rofiTheme
bind = $mainMod, J, togglesplit  

# Dynamic color & theme management
bind = $mainMod, N, exec, ~/.local/scripts/system/change-wallpaper.sh
bind = $mainMod, W, exec, ~/.local/scripts/hypr/update-hypr-colors.sh

# Custom workflow
bind = $mainMod, A, exec, ~/.config/walker/scripts/launch-workflow.sh coding
bind = $mainMod, T, exec, ~/.config/walker/scripts/launch-workflow.sh creative
bind = $mainMod, X, exec, $reload_waybar

# ──────────────────────────────────────────────────────────────
#  🎥 SCREENSHOTS
# ──────────────────────────────────────────────────────────────
bind = , PRINT, exec, hyprshot -m region
bind = $mainMod, PRINT, exec, hyprshot -m window
bind = SHIFT, PRINT, exec, hyprshot -m region -c
bind = ALT, PRINT, exec, hyprshot -m region -e

# ──────────────────────────────────────────────────────────────
#  🧭 WORKSPACE & WINDOW MOVEMENT
# ──────────────────────────────────────────────────────────────
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# ──────────────────────────────────────────────────────────────
#  🔊 MEDIA + BRIGHTNESS CONTROLS
# ──────────────────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 6%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# ──────────────────────────────────────────────────────────────
# 🪟 OMARCHY WEB APPS (v0.53+ Unified Syntax)
# ──────────────────────────────────────────────────────────────

# Walker UI: Applying blur and opacity
layerrule = blur on, match:namespace ^(walker)$
layerrule = ignore_alpha 0.5, match:namespace ^(walker)$
windowrule = match:class ^(walker)$, opacity 0.92 0.92

# Omarchy Terminal: Force float
windowrule = match:title ^(Omarchy Terminal)$, float on

# Qutebrowser & Brave Defaults: Force float
windowrule = match:class ^(qutebrowser|Brave-browser)$, float on

# Web Apps Grouped: Float + Move to Workspace 2
# Note: Syntax uses 'on' for booleans and space separation for workspace
windowrule = match:title ^(Github|Youtube Music|ChatGPT|Search|Monkey Type|MovieBox|You|Deepseek)$, float on
windowrule = match:title ^(Github|Youtube Music|ChatGPT|Search|Monkey Type|MovieBox|You|Deepseek)$, workspace 2

# Global Logic: Center all floating windows
windowrule = match:float on, center on
